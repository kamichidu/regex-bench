name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Generate input data
        run: go run scripts/generate-input.go

      - name: Build Go stdlib
        run: cd go-stdlib && go build -o ../bin/go-stdlib .

      - name: Build Go coregex
        run: cd go-coregex && go build -o ../bin/go-coregex .

      - name: Build Rust
        run: cd rust && cargo build --release && cp target/release/benchmark ../bin/rust-benchmark

      - name: Run benchmarks
        run: |
          # Run all benchmarks (tee to stdout for log visibility)
          ./bin/go-stdlib input/data.txt | tee /tmp/stdlib.txt
          echo ""
          ./bin/go-coregex input/data.txt | tee /tmp/coregex.txt
          echo ""
          ./bin/rust-benchmark input/data.txt | tee /tmp/rust.txt

          # Generate summary
          echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Platform**: Ubuntu $(lsb_release -rs), $(uname -m)" >> $GITHUB_STEP_SUMMARY
          echo "**CPU**: $(grep 'model name' /proc/cpuinfo | head -1 | cut -d: -f2 | xargs)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Search time comparison table (the main metric)
          echo "### Search Time Comparison" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Pattern | Go stdlib | Go coregex | Rust regex | vs stdlib | vs Rust | Winner |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----------|------------|------------|-----------|---------|--------|" >> $GITHUB_STEP_SUMMARY

          # New format: pattern compile search matches
          # Extract search time (column 3) from each output
          grep -E "^[a-z_]+\s" /tmp/stdlib.txt | while read line; do
            pattern=$(echo "$line" | awk '{print $1}')
            std_search=$(echo "$line" | awk '{print $3}')

            cor_line=$(grep "^${pattern}\s" /tmp/coregex.txt)
            cor_search=$(echo "$cor_line" | awk '{print $3}')

            rus_line=$(grep "^${pattern}\s" /tmp/rust.txt)
            rus_search=$(echo "$rus_line" | awk '{print $3}')

            # vs stdlib speedup
            if [ -n "$cor_search" ] && [ "$cor_search" != "0.00" ]; then
              speedup=$(echo "scale=0; $std_search / $cor_search" | bc 2>/dev/null || echo "0")
              if [ "$speedup" -ge 2 ] 2>/dev/null; then
                vs_stdlib="**${speedup}x**"
              else
                vs_stdlib="~1x"
              fi
            else
              vs_stdlib="—"
            fi

            # vs Rust comparison
            if [ -n "$cor_search" ] && [ -n "$rus_search" ] && [ "$rus_search" != "0.00" ] && [ "$cor_search" != "0.00" ]; then
              cor_faster=$(echo "$cor_search < $rus_search" | bc -l 2>/dev/null || echo "0")
              if [ "$cor_faster" -eq 1 ] 2>/dev/null; then
                ratio=$(echo "scale=1; $rus_search / $cor_search" | bc)
                vs_rust="**${ratio}x faster**"
                winner="coregex"
                cor_fmt="**${cor_search} ms**"
                rus_fmt="${rus_search} ms"
              else
                ratio=$(echo "scale=1; $cor_search / $rus_search" | bc)
                vs_rust="${ratio}x slower"
                winner="Rust"
                cor_fmt="${cor_search} ms"
                rus_fmt="**${rus_search} ms**"
              fi
            else
              vs_rust="~same"
              winner="—"
              cor_fmt="${cor_search} ms"
              rus_fmt="${rus_search} ms"
            fi

            echo "| $pattern | ${std_search} ms | $cor_fmt | $rus_fmt | $vs_stdlib | $vs_rust | $winner |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY

          # Compile time comparison table
          echo "### Compile Time Comparison" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Pattern | Go stdlib | Go coregex | Rust regex |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----------|------------|------------|" >> $GITHUB_STEP_SUMMARY

          grep -E "^[a-z_]+\s" /tmp/stdlib.txt | while read line; do
            pattern=$(echo "$line" | awk '{print $1}')
            std_compile=$(echo "$line" | awk '{print $2}')

            cor_line=$(grep "^${pattern}\s" /tmp/coregex.txt)
            cor_compile=$(echo "$cor_line" | awk '{print $2}')

            rus_line=$(grep "^${pattern}\s" /tmp/rust.txt)
            rus_compile=$(echo "$rus_line" | awk '{print $2}')

            echo "| $pattern | ${std_compile} ms | ${cor_compile} ms | ${rus_compile} ms |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Raw output
          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary>Raw Output (click to expand)</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "#### Go stdlib" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/stdlib.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "#### Go coregex" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/coregex.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "#### Rust regex" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/rust.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "</details>" >> $GITHUB_STEP_SUMMARY
