name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Generate input data
        run: go run scripts/generate-input.go

      - name: Build Go stdlib
        run: cd go-stdlib && go build -o ../bin/go-stdlib .

      - name: Build Go coregex
        run: cd go-coregex && go build -o ../bin/go-coregex .

      - name: Build Rust
        run: cd rust && cargo build --release && cp target/release/benchmark ../bin/rust-benchmark

      - name: Run benchmarks
        run: |
          # Run all benchmarks and save to files
          ./bin/go-stdlib input/data.txt > /tmp/stdlib.txt
          ./bin/go-coregex input/data.txt > /tmp/coregex.txt
          ./bin/rust-benchmark input/data.txt > /tmp/rust.txt

          # Generate summary header
          echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Platform**: Ubuntu $(lsb_release -rs), $(uname -m)" >> $GITHUB_STEP_SUMMARY
          echo "**CPU**: $(grep 'model name' /proc/cpuinfo | head -1 | cut -d: -f2 | xargs)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Generate comparison table
          echo "### Comparison Table" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Parse results and build table
          echo "| Pattern | Go stdlib | Go coregex | Rust regex | vs stdlib | vs Rust | Winner |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----------|------------|------------|-----------|---------|--------|" >> $GITHUB_STEP_SUMMARY

          # Extract patterns from stdlib output (skip header lines)
          grep -E "^[a-z_]+\s+[0-9.]+ ms" /tmp/stdlib.txt | while read line; do
            pattern=$(echo "$line" | awk '{print $1}')
            std_ms=$(echo "$line" | awk '{print $2}')
            std_matches=$(echo "$line" | awk '{print $4}')

            # Get coregex result
            cor_line=$(grep "^${pattern}\s" /tmp/coregex.txt)
            cor_ms=$(echo "$cor_line" | awk '{print $2}')

            # Get rust result
            rus_line=$(grep "^${pattern}\s" /tmp/rust.txt)
            rus_ms=$(echo "$rus_line" | awk '{print $2}')

            # Calculate vs stdlib speedup
            if [ -n "$cor_ms" ] && [ "$cor_ms" != "0" ]; then
              speedup=$(echo "scale=0; $std_ms / $cor_ms" | bc)
              if [ "$speedup" -ge 2 ]; then
                vs_stdlib="**${speedup}x**"
              else
                vs_stdlib="~1x"
              fi
            else
              vs_stdlib="—"
            fi

            # Calculate vs Rust comparison
            if [ -n "$cor_ms" ] && [ -n "$rus_ms" ] && [ "$rus_ms" != "0" ]; then
              # Check if coregex is faster
              cor_faster=$(echo "$cor_ms < $rus_ms" | bc -l)
              if [ "$cor_faster" -eq 1 ]; then
                ratio=$(echo "scale=1; $rus_ms / $cor_ms" | bc)
                vs_rust="**${ratio}x faster**"
                winner="coregex"
                cor_fmt="**${cor_ms} ms**"
                rus_fmt="${rus_ms} ms"
              else
                ratio=$(echo "scale=1; $cor_ms / $rus_ms" | bc)
                vs_rust="${ratio}x slower"
                winner="Rust"
                cor_fmt="${cor_ms} ms"
                rus_fmt="**${rus_ms} ms**"
              fi
            else
              vs_rust="—"
              winner="—"
              cor_fmt="${cor_ms} ms"
              rus_fmt="${rus_ms} ms"
            fi

            echo "| $pattern | ${std_ms} ms | $cor_fmt | $rus_fmt | $vs_stdlib | $vs_rust | $winner |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Also show raw output for debugging
          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary>Raw Output (click to expand)</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "#### Go stdlib" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/stdlib.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "#### Go coregex" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/coregex.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "#### Rust regex" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/rust.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "</details>" >> $GITHUB_STEP_SUMMARY
