name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install PCRE2, Hyperscan and RE2
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcre2-dev libhyperscan-dev libre2-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Generate and Report
        run: |
          make report

      - name: Commit and Push Report
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add REPORT.md
          if ! git diff --staged --quiet; then
            git commit -m "docs: update benchmark report [skip ci]"
            git push
          else
            echo "No changes to REPORT.md"
          fi

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: REPORT.md

      - name: Publish Summary
        run: cat REPORT.md >> $GITHUB_STEP_SUMMARY
