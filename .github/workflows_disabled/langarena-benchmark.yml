name: LangArena Benchmark (LogParser)

# 13 patterns from https://kostya.github.io/LangArena/ (Etc::LogParser)
# Real-world Apache log parsing patterns that expose Go regex weakness vs Rust.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  langarena-benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Generate LangArena input data
        run: go run scripts/generate-langarena-input.go

      - name: Build engines
        run: |
          cd go-regexp-re && go build -o ../bin/go-regexp-re .
          cd ../go-coregex && go build -o ../bin/go-coregex .

      - name: Run LangArena benchmarks
        run: |
          echo "## LangArena LogParser Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**13 patterns from [LangArena](https://kostya.github.io/LangArena/) (Etc::LogParser) — real-world Apache log parsing on 6 MB generated data.**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Platform**: Ubuntu $(lsb_release -rs), $(uname -m)" >> $GITHUB_STEP_SUMMARY
          echo "**CPU**: $(grep 'model name' /proc/cpuinfo | head -1 | cut -d: -f2 | xargs)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          ./bin/go-regexp-re -scenario langarena input/langarena-data.txt | tee /tmp/stdlib.txt
          echo ""
          ./bin/go-coregex -scenario langarena input/langarena-data.txt | tee /tmp/coregex.txt

          echo "### Search Time Comparison" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Pattern | Go stdlib | Go coregex | vs stdlib |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----------|------------|-----------|" >> $GITHUB_STEP_SUMMARY

          grep -E "^[a-z_]+\s" /tmp/stdlib.txt | grep -v "^pattern " | while read line; do
            pattern=$(echo "$line" | awk '{print $1}')
            std_search=$(echo "$line" | awk '{print $3}')

            cor_line=$(grep "^${pattern} " /tmp/coregex.txt)
            cor_search=$(echo "$cor_line" | awk '{print $3}')

            # vs stdlib speedup
            if [ -n "$cor_search" ] && [ -n "$std_search" ]; then
              cor_ms_int=$(echo "$cor_search * 1000" | bc | cut -d. -f1)
              std_ms_int=$(echo "$std_search * 1000" | bc | cut -d. -f1)
              if [ "$cor_ms_int" -le "$std_ms_int" ] 2>/dev/null; then
                speedup=$(echo "scale=1; $std_search / $cor_search" | bc 2>/dev/null)
                speedup_int=$(echo "scale=0; $std_search / $cor_search" | bc 2>/dev/null)
                if [ "$speedup_int" -ge 2 ] 2>/dev/null; then
                  vs_stdlib="**${speedup}x faster**"
                  cor_fmt="**${cor_search} ms**"
                elif [ "$speedup_int" -eq 1 ] 2>/dev/null; then
                  # Check if it's 1.5x+ (meaningful speedup)
                  frac=$(echo "scale=0; $std_search * 10 / $cor_search" | bc 2>/dev/null)
                  if [ "$frac" -ge 15 ] 2>/dev/null; then
                    vs_stdlib="${speedup}x faster"
                  else
                    vs_stdlib="~1x"
                  fi
                  cor_fmt="${cor_search} ms"
                else
                  vs_stdlib="~1x"
                  cor_fmt="${cor_search} ms"
                fi
              else
                slowdown=$(echo "scale=1; $cor_search / $std_search" | bc 2>/dev/null)
                vs_stdlib="${slowdown}x slower"
                cor_fmt="${cor_search} ms"
              fi
            else
              vs_stdlib="—"
              cor_fmt="${cor_search} ms"
            fi

            echo "| $pattern | ${std_search} ms | $cor_fmt | $vs_stdlib |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY

          # Compile time comparison table
          echo "### Compile Time Comparison" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Pattern | Go stdlib | Go coregex |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----------|------------|" >> $GITHUB_STEP_SUMMARY

          grep -E "^[a-z_]+\s" /tmp/stdlib.txt | grep -v "^pattern " | while read line; do
            pattern=$(echo "$line" | awk '{print $1}')
            std_compile=$(echo "$line" | awk '{print $2}')

            cor_line=$(grep "^${pattern} " /tmp/coregex.txt)
            cor_compile=$(echo "$cor_line" | awk '{print $2}')

            echo "| $pattern | ${std_compile} ms | ${cor_compile} ms |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Patterns from [LangArena LogParser](https://kostya.github.io/LangArena/). Reported by [@kostya](https://github.com/kostya) in [coregex#116](https://github.com/coregx/coregex/issues/116)." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Raw output
          echo "<details>" >> $GITHUB_STEP_SUMMARY
          echo "<summary>Raw Output (click to expand)</summary>" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "#### Go stdlib" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/stdlib.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "#### Go coregex" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/coregex.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "</details>" >> $GITHUB_STEP_SUMMARY

