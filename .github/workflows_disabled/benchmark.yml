name: Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install PCRE2 and Hyperscan
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcre2-dev libhyperscan-dev

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Generate and Report
        run: |
          make report

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-report
          path: REPORT.md

      - name: Publish Summary
        run: cat REPORT.md >> $GITHUB_STEP_SUMMARY
