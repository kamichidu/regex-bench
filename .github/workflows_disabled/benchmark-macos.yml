name: Benchmark (macOS ARM64)

# Same benchmarks as linux, but on Apple Silicon (M-series).
# Useful for comparing ARM64 performance where SIMD prefilters (Teddy/memchr)
# are not available — pure DFA/NFA throughput comparison.
#
# Note: macOS runners cost 10x linux. Use workflow_dispatch for on-demand runs.

on:
  workflow_dispatch:

jobs:
  benchmark-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Generate input data
        run: go run scripts/generate-input.go

      - name: Build Go stdlib
        run: cd go-regexp-re && go build -o ../bin/go-regexp-re .

      - name: Build Go coregex
        run: cd go-coregex && go build -o ../bin/go-coregex .

      - name: Run benchmarks
        run: |
          echo "## Benchmark Results (macOS ARM64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Platform**: macOS $(sw_vers -productVersion), $(uname -m)" >> $GITHUB_STEP_SUMMARY
          echo "**CPU**: $(sysctl -n machdep.cpu.brand_string 2>/dev/null || echo 'Apple Silicon')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          ./bin/go-regexp-re input/data.txt | tee /tmp/stdlib.txt
          echo ""
          ./bin/go-coregex input/data.txt | tee /tmp/coregex.txt

          echo "### Search Time Comparison" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Pattern | Go stdlib | Go coregex | vs stdlib |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----------|------------|-----------|" >> $GITHUB_STEP_SUMMARY

          grep -E "^[a-z_]+\s" /tmp/stdlib.txt | grep -v "^pattern " | while read line; do
            pattern=$(echo "$line" | awk '{print $1}')
            std_search=$(echo "$line" | awk '{print $3}')

            cor_line=$(grep "^${pattern} " /tmp/coregex.txt)
            cor_search=$(echo "$cor_line" | awk '{print $3}')

            # vs stdlib speedup
            if [ -n "$cor_search" ] && [ -n "$std_search" ] && [ "$cor_search" != "0.00" ]; then
              speedup_frac=$(echo "scale=1; $std_search / $cor_search" | bc 2>/dev/null || echo "0")
              speedup_int=$(echo "scale=0; $std_search / $cor_search" | bc 2>/dev/null || echo "0")
              if [ "$speedup_int" -ge 2 ] 2>/dev/null; then
                vs_stdlib="**${speedup_frac}x faster**"
                cor_fmt="**${cor_search} ms**"
              else
                frac=$(echo "scale=0; $std_search * 10 / $cor_search" | bc 2>/dev/null || echo "0")
                if [ "$frac" -ge 15 ] 2>/dev/null; then
                  vs_stdlib="${speedup_frac}x faster"
                else
                  vs_stdlib="~1x"
                fi
                cor_fmt="${cor_search} ms"
              fi
            else
              vs_stdlib="—"
              cor_fmt="${cor_search} ms"
            fi

            echo "| $pattern | ${std_search} ms | $cor_fmt | $vs_stdlib |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> macOS ARM64 — no x86 SIMD prefilters (Teddy/memchr). Pure DFA/NFA comparison." >> $GITHUB_STEP_SUMMARY

  langarena-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Generate LangArena input data
        run: go run scripts/generate-langarena-input.go

      - name: Build Go stdlib LangArena
        run: cd go-regexp-re-langarena && go build -o ../bin/go-regexp-re-langarena .

      - name: Build Go coregex LangArena
        run: cd go-coregex-langarena && go build -o ../bin/go-coregex-langarena .

      - name: Run LangArena benchmarks
        run: |
          echo "## LangArena LogParser (macOS ARM64)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Platform**: macOS $(sw_vers -productVersion), $(uname -m)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          ./bin/go-regexp-re-langarena input/langarena-data.txt | tee /tmp/stdlib.txt
          echo ""
          ./bin/go-coregex-langarena input/langarena-data.txt | tee /tmp/coregex.txt

          echo "### Search Time Comparison" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Pattern | Go stdlib | Go coregex | vs stdlib |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----------|------------|-----------|" >> $GITHUB_STEP_SUMMARY

          grep -E "^[a-z_]+\s" /tmp/stdlib.txt | grep -v "^pattern " | while read line; do
            pattern=$(echo "$line" | awk '{print $1}')
            std_search=$(echo "$line" | awk '{print $3}')

            cor_line=$(grep "^${pattern} " /tmp/coregex.txt)
            cor_search=$(echo "$cor_line" | awk '{print $3}')

            if [ -n "$cor_search" ] && [ -n "$std_search" ]; then
              speedup_frac=$(echo "scale=1; $std_search / $cor_search" | bc 2>/dev/null || echo "0")
              speedup_int=$(echo "scale=0; $std_search / $cor_search" | bc 2>/dev/null || echo "0")
              if [ "$speedup_int" -ge 2 ] 2>/dev/null; then
                vs_stdlib="**${speedup_frac}x faster**"
                cor_fmt="**${cor_search} ms**"
              else
                vs_stdlib="~1x"
                cor_fmt="${cor_search} ms"
              fi
            else
              vs_stdlib="—"
              cor_fmt="${cor_search} ms"
            fi

            echo "| $pattern | ${std_search} ms | $cor_fmt | $vs_stdlib |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> macOS ARM64 — no x86 SIMD. Comparable to @kostya's M1 MacBook results." >> $GITHUB_STEP_SUMMARY

