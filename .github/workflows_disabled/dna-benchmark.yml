name: DNA Benchmark (regexdna)

# regexdna patterns from The Computer Language Benchmarks Game
# Tests alternation + char class patterns on DNA sequences (a/c/g/t)
# Inspired by Issue coregx/coregex#116 reported by @kostya

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  dna-benchmark:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Generate DNA input data
        run: go run scripts/generate-dna-input.go

      - name: Build engines
        run: |
          cd go-regexp-re && go build -o ../bin/go-regexp-re .
          cd ../go-coregex && go build -o ../bin/go-coregex .

      - name: Run DNA benchmarks
        run: |
          echo "## regexdna Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**9 patterns from [The Computer Language Benchmarks Game](https://benchmarksgame-team.pages.debian.net/benchmarksgame/) — DNA reverse complement matching on 6 MB generated sequence.**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Platform**: Ubuntu $(lsb_release -rs), $(uname -m)" >> $GITHUB_STEP_SUMMARY
          echo "**CPU**: $(grep 'model name' /proc/cpuinfo | head -1 | cut -d: -f2 | xargs)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          ./bin/go-regexp-re -scenario dna input/dna-data.txt | tee /tmp/stdlib.txt
          ./bin/go-coregex -scenario dna input/dna-data.txt | tee /tmp/coregex.txt

          echo "### Search Time Comparison" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Pattern | Regex | Strategy | Go stdlib | Go coregex | vs stdlib |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|----------|-----------|------------|-----------|" >> $GITHUB_STEP_SUMMARY

          # Pattern regexes for display
          declare -A regexes
          regexes[dna_1]='agggtaaa|tttaccct'
          regexes[dna_2]='[cgt]gggtaaa|tttaccc[acg]'
          regexes[dna_3]='a[act]ggtaaa|tttacc[agt]t'
          regexes[dna_4]='ag[act]gtaaa|tttac[agt]ct'
          regexes[dna_5]='agg[act]taaa|ttta[agt]cct'
          regexes[dna_6]='aggg[acg]aaa|ttt[cgt]ccct'
          regexes[dna_7]='agggt[cgt]aa|tt[acg]accct'
          regexes[dna_8]='agggta[cgt]a|t[acg]taccct'
          regexes[dna_9]='agggtaa[cgt]|[acg]ttaccct'

          grep -E "^dna_" /tmp/stdlib.txt | while read line; do
            pattern=$(echo "$line" | awk '{print $1}')
            std_search=$(echo "$line" | awk '{print $3}')

            cor_line=$(grep "^${pattern} " /tmp/coregex.txt)
            cor_search=$(echo "$cor_line" | awk '{print $3}')
            strategy=$(echo "$cor_line" | awk '{print $5}')

            regex="${regexes[$pattern]//|/\\|}"

            # vs stdlib speedup
            if [ -n "$cor_search" ] && [ -n "$std_search" ]; then
              cor_ms_int=$(echo "$cor_search * 1000" | bc | cut -d. -f1)
              std_ms_int=$(echo "$std_search * 1000" | bc | cut -d. -f1)
              if [ "$cor_ms_int" -le "$std_ms_int" ] 2>/dev/null; then
                speedup=$(echo "scale=1; $std_search / $cor_search" | bc 2>/dev/null)
                speedup_int=$(echo "scale=0; $std_search / $cor_search" | bc 2>/dev/null)
                if [ "$speedup_int" -gt 2 ] 2>/dev/null; then
                  vs_stdlib="**${speedup}x faster**"
                  cor_fmt="**${cor_search} ms**"
                else
                  vs_stdlib="~1x"
                  cor_fmt="${cor_search} ms"
                fi
              else
                slowdown=$(echo "scale=1; $cor_search / $std_search" | bc 2>/dev/null)
                vs_stdlib="${slowdown}x slower"
                cor_fmt="${cor_search} ms"
              fi
            else
              vs_stdlib="—"
              cor_fmt="${cor_search} ms"
            fi

            echo "| $pattern | \`$regex\` | $strategy | ${std_search} ms | $cor_fmt | $vs_stdlib |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Patterns from [regexdna benchmark](https://benchmarksgame-team.pages.debian.net/benchmarksgame/). Reported by [@kostya](https://github.com/kostya) in [coregex#116](https://github.com/coregx/coregex/issues/116)." >> $GITHUB_STEP_SUMMARY

